<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meskerem Primary | Worksheet Bank</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 30px;
  animation: slideDown 0.5s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 3rem;
  font-weight: 800;
  color: white;
  text-shadow: 0 10px 30px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

h1 i {
  font-size: 2.5rem;
}

.subtitle {
  color: rgba(255,255,255,0.9);
  font-size: 1.2rem;
  margin-top: 10px;
}

/* Cards */
.card {
  background: white;
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  animation: fadeIn 0.6s ease;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h2 {
  color: #333;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.8rem;
}

h2 i {
  color: #667eea;
}

/* Forms */
.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  color: #555;
  font-weight: 500;
}

input, select {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  font-size: 1rem;
  transition: all 0.3s;
  font-family: 'Inter', sans-serif;
}

input:focus, select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

input[type="file"] {
  padding: 12px;
  cursor: pointer;
}

input[type="file"]::file-selector-button {
  background: #667eea;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 15px;
  font-weight: 600;
}

/* Buttons */
.btn {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  padding: 16px 24px;
  border-radius: 12px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
}

.btn:active {
  transform: translateY(0);
}

.btn-secondary {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  box-shadow: 0 10px 20px rgba(240, 147, 251, 0.3);
}

.btn-danger {
  background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
  box-shadow: 0 10px 20px rgba(250, 112, 154, 0.3);
}

/* File Grid */
.file-grid {
  display: grid;
  gap: 15px;
  margin-top: 20px;
}

.file-card {
  background: #f8f9fa;
  border-radius: 15px;
  padding: 20px;
  transition: all 0.3s;
  border: 1px solid #e0e0e0;
  animation: fadeIn 0.5s ease;
}

.file-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  border-color: #667eea;
}

.file-header {
  display: flex;
  align-items: start;
  gap: 12px;
  margin-bottom: 12px;
}

.file-icon {
  font-size: 2rem;
  color: #667eea;
}

.file-info {
  flex: 1;
}

.file-name {
  font-weight: 700;
  font-size: 1.1rem;
  color: #333;
  margin-bottom: 5px;
}

.file-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  color: #666;
  font-size: 0.9rem;
  margin: 10px 0;
}

.file-meta span {
  display: flex;
  align-items: center;
  gap: 5px;
}

.file-actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.btn-small {
  padding: 8px 16px;
  font-size: 0.9rem;
  border-radius: 8px;
  flex: 1;
}

/* Admin Section */
.admin-section {
  margin-top: 30px;
  padding-top: 30px;
  border-top: 2px dashed #e0e0e0;
}

.admin-toggle {
  background: none;
  border: 2px dashed #999;
  color: #666;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 20px;
  transition: all 0.3s;
}

.admin-toggle:hover {
  border-color: #667eea;
  color: #667eea;
}

.admin-panel {
  display: none;
  margin-top: 20px;
}

.admin-panel.active {
  display: block;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.stat-card {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.stat-number {
  font-size: 2.5rem;
  font-weight: 800;
}

.stat-label {
  font-size: 0.9rem;
  opacity: 0.9;
  margin-top: 5px;
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: #666;
}

.loading i {
  font-size: 3rem;
  margin-bottom: 15px;
  color: #667eea;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px;
  color: #999;
}

.empty-state i {
  font-size: 4rem;
  margin-bottom: 15px;
  opacity: 0.5;
}

/* Responsive */
@media (max-width: 768px) {
  h1 { font-size: 2rem; }
  .file-meta { flex-direction: column; gap: 5px; }
  .file-actions { flex-direction: column; }
}

/* Toast Notifications */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  padding: 16px 24px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: slideIn 0.3s ease;
  z-index: 1000;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast.success { border-left: 4px solid #4caf50; }
.toast.error { border-left: 4px solid #f44336; }
.toast i { font-size: 1.5rem; }
.toast.success i { color: #4caf50; }
.toast.error i { color: #f44336; }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>
      <i class="fas fa-school"></i>
      Meskerem Primary
      <i class="fas fa-book"></i>
    </h1>
    <div class="subtitle">Worksheet Bank • Teacher Portal</div>
  </div>

  <!-- Upload Card -->
  <div class="card">
    <h2>
      <i class="fas fa-cloud-upload-alt"></i>
      Upload New Worksheet
    </h2>
    
    <div class="form-group">
      <label><i class="fas fa-user"></i> Teacher Name</label>
      <input type="text" id="teacherName" placeholder="Enter your full name" autocomplete="off">
    </div>

    <div class="form-group">
      <label><i class="fas fa-graduation-cap"></i> Grade Level</label>
      <select id="gradeLevel">
        <option value="">Select Grade</option>
        <option value="Grade 1">Grade 1</option>
        <option value="Grade 2">Grade 2</option>
        <option value="Grade 3">Grade 3</option>
        <option value="Grade 4">Grade 4</option>
        <option value="Grade 5">Grade 5</option>
        <option value="Grade 6">Grade 6</option>
        <option value="Grade 7">Grade 7</option>
        <option value="Grade 8">Grade 8</option>
      </select>
    </div>

    <div class="form-group">
      <label><i class="fas fa-book-open"></i> Subject</label>
      <input type="text" id="subject" placeholder="e.g., Mathematics, English, Science">
    </div>

    <div class="form-group">
      <label><i class="fas fa-file"></i> Select File</label>
      <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png,.txt">
    </div>

    <button class="btn" onclick="uploadWorksheet()">
      <i class="fas fa-upload"></i>
      Upload Worksheet
    </button>
  </div>

  <!-- Worksheets List Card -->
  <div class="card">
    <h2>
      <i class="fas fa-folder-open"></i>
      Available Worksheets
      <span style="margin-left: auto; font-size: 0.9rem;">
        <i class="fas fa-sync-alt" onclick="loadWorksheets()" style="cursor: pointer;"></i>
      </span>
    </h2>
    
    <div id="worksheetsList">
      <div class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading worksheets...</p>
      </div>
    </div>

    <!-- Admin Section -->
    <div class="admin-section">
      <button class="admin-toggle" onclick="toggleAdmin()">
        <i class="fas fa-shield-alt"></i>
        Admin Panel
      </button>
      
      <div class="admin-panel" id="adminPanel">
        <h3 style="margin-bottom: 20px;">
          <i class="fas fa-crown"></i>
          Administrator Controls
        </h3>
        
        <div class="stats">
          <div class="stat-card">
            <div class="stat-number" id="totalFiles">0</div>
            <div class="stat-label">Total Files</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalTeachers">0</div>
            <div class="stat-label">Teachers</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalGrades">0</div>
            <div class="stat-label">Grades</div>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-key"></i> Admin Password</label>
          <input type="password" id="adminPassword" placeholder="Enter admin password">
        </div>

        <button class="btn btn-danger" onclick="clearAllWorksheets()">
          <i class="fas fa-trash-alt"></i>
          Clear All Worksheets
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// SUPABASE CONFIGURATION
const SUPABASE_URL = 'https://hrukqjwbglnpbbmercms.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhydWtxandiZ2xucGJibWVyY21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjU0NTYsImV4cCI6MjA5MTk0MTQ1Nn0.3JrimFgk0z_yvJOzTfUPZKBKcmwwqUc19wRfxXpPYA0';
const ADMIN_PASSWORD = 'meskerem2026';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Initialize
window.onload = function() {
  loadSavedTeacher();
  loadWorksheets();
};

function loadSavedTeacher() {
  const saved = localStorage.getItem('teacherName');
  if (saved) {
    document.getElementById('teacherName').value = saved;
  }
}

function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
    <span>${message}</span>
  `;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

async function uploadWorksheet() {
  const teacherName = document.getElementById('teacherName').value.trim();
  const grade = document.getElementById('gradeLevel').value;
  const subject = document.getElementById('subject').value.trim();
  const file = document.getElementById('fileInput').files[0];

  if (!teacherName || !grade || !subject || !file) {
    showToast('Please fill all fields and select a file', 'error');
    return;
  }

  // Save teacher name
  localStorage.setItem('teacherName', teacherName);

  // Show loading
  const btn = event.target;
  const originalText = btn.innerHTML;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
  btn.disabled = true;

  try {
    const fileName = `${Date.now()}_${file.name}`;
    const filePath = `${grade}/${subject}/${fileName}`;

    // Upload to Storage
    const { error: uploadError } = await supabase.storage
      .from('worksheet')
      .upload(filePath, file);

    if (uploadError) throw uploadError;

    // Get public URL
    const { data: { publicUrl } } = supabase.storage
      .from('worksheet')
      .getPublicUrl(filePath);

    // Save to Database
    const { error: dbError } = await supabase
      .from('worksheet')
      .insert([{
        teacher_id: teacherName,
        grade: grade,
        subject: subject,
        file_url: publicUrl,
        file_name: file.name
      }]);

    if (dbError) throw dbError;

    showToast('Worksheet uploaded successfully!', 'success');
    
    // Clear form
    document.getElementById('subject').value = '';
    document.getElementById('fileInput').value = '';
    
    // Reload list
    loadWorksheets();
  } catch (error) {
    console.error('Upload error:', error);
    showToast('Upload failed: ' + error.message, 'error');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

async function loadWorksheets() {
  const container = document.getElementById('worksheetsList');
  container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>';

  try {
    const { data, error } = await supabase
      .from('worksheet')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;

    if (!data || data.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>No worksheets yet. Be the first to upload!</p>
        </div>
      `;
      updateStats([]);
      return;
    }

    displayWorksheets(data);
    updateStats(data);
  } catch (error) {
    console.error('Load error:', error);
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Failed to load worksheets</p>
      </div>
    `;
  }
}

function displayWorksheets(worksheets) {
  const container = document.getElementById('worksheetsList');
  container.innerHTML = '<div class="file-grid"></div>';
  const grid = container.querySelector('.file-grid');

  worksheets.forEach(worksheet => {
    const card = document.createElement('div');
    card.className = 'file-card';
    
    const fileIcon = getFileIcon(worksheet.file_name);
    
    card.innerHTML = `
      <div class="file-header">
        <div class="file-icon">${fileIcon}</div>
        <div class="file-info">
          <div class="file-name">${worksheet.file_name}</div>
          <div class="file-meta">
            <span><i class="fas fa-user"></i> ${worksheet.teacher_id}</span>
            <span><i class="fas fa-graduation-cap"></i> ${worksheet.grade}</span>
            <span><i class="fas fa-book"></i> ${worksheet.subject}</span>
          </div>
        </div>
      </div>
      <div class="file-actions">
        <button class="btn btn-small" onclick="window.open('${worksheet.file_url}', '_blank')">
          <i class="fas fa-eye"></i> View
        </button>
        <button class="btn btn-small btn-secondary" onclick="downloadFile('${worksheet.file_url}', '${worksheet.file_name}')">
          <i class="fas fa-download"></i> Download
        </button>
        <button class="btn btn-small btn-danger" onclick="deleteWorksheet(${worksheet.id})">
          <i class="fas fa-trash"></i> Delete
        </button>
      </div>
    `;
    
    grid.appendChild(card);
  });
}

function getFileIcon(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  const icons = {
    pdf: '<i class="fas fa-file-pdf"></i>',
    doc: '<i class="fas fa-file-word"></i>',
    docx: '<i class="fas fa-file-word"></i>',
    ppt: '<i class="fas fa-file-powerpoint"></i>',
    pptx: '<i class="fas fa-file-powerpoint"></i>',
    jpg: '<i class="fas fa-file-image"></i>',
    jpeg: '<i class="fas fa-file-image"></i>',
    png: '<i class="fas fa-file-image"></i>',
    txt: '<i class="fas fa-file-alt"></i>'
  };
  return icons[ext] || '<i class="fas fa-file"></i>';
}

function downloadFile(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.target = '_blank';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

async function deleteWorksheet(id) {
  if (!confirm('Are you sure you want to delete this worksheet?')) return;

  try {
    const { error } = await supabase
      .from('worksheet')
      .delete()
      .eq('id', id);

    if (error) throw error;

    showToast('Worksheet deleted successfully!', 'success');
    loadWorksheets();
  } catch (error) {
    console.error('Delete error:', error);
    showToast('Failed to delete worksheet', 'error');
  }
}

function updateStats(worksheets) {
  const totalFiles = worksheets.length;
  const uniqueTeachers = new Set(worksheets.map(w => w.teacher_id)).size;
  const uniqueGrades = new Set(worksheets.map(w => w.grade)).size;

  document.getElementById('totalFiles').textContent = totalFiles;
  document.getElementById('totalTeachers').textContent = uniqueTeachers;
  document.getElementById('totalGrades').textContent = uniqueGrades;
}

function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  panel.classList.toggle('active');
}

async function clearAllWorksheets() {
  const password = document.getElementById('adminPassword').value;
  
  if (password !== ADMIN_PASSWORD) {
    showToast('Invalid admin password!', 'error');
    return;
  }

  if (!confirm('⚠️ WARNING: This will delete ALL worksheets permanently! Are you absolutely sure?')) return;
  if (!confirm('FINAL WARNING: This action cannot be undone! Click OK to proceed.')) return;

  try {
    const { error } = await supabase
      .from('worksheet')
      .delete()
      .neq('id', 0);

    if (error) throw error;

    showToast('All worksheets have been cleared', 'success');
    document.getElementById('adminPassword').value = '';
    document.getElementById('adminPanel').classList.remove('active');
    loadWorksheets();
  } catch (error) {
    console.error('Clear error:', error);
    showToast('Failed to clear worksheets', 'error');
  }
}
</script>

</body>
</html>
